name: Deploy to Production

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4
 
      - id: configure-ssh
        name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host myserver"
            echo "  HostName ${{ secrets.EC2_SERVER_HOST }}"
            echo "  User ${{ secrets.EC2_SERVER_USER }}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  IdentitiesOnly yes"
            echo "  BatchMode yes"
            echo "  ConnectTimeout 15"
            echo "  ServerAliveInterval 15"
            echo "  ServerAliveCountMax 2"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
          } >> ~/.ssh/config

      - id: upload-ec2-deploy-script
        name: Upload Deployment Script
        timeout-minutes: 2
        run: |
          ssh myserver 'cat > /tmp/deploy-ec2.sh' < scripts/deploy-ec2.sh
          ssh myserver 'chmod +x /tmp/deploy-ec2.sh'

      - id: run-ec2-deploy-script-via-ssh
        name: Run Deployment Script
        timeout-minutes: 30
        env:
          DEPLOY_ROOT: ${{ vars.EC2_DEPLOY_ROOT_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          APP_SERVER_PORT: ${{ vars.APP_SERVER_PORT }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_OWNER: ${{ vars.APP_OWNER }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          EC2_ENV_FILE: ${{ vars.EC2_ENV_FILE || '.env.production' }}
        run: |
          ssh myserver \
            "DEPLOY_ROOT='${DEPLOY_ROOT}' /tmp/deploy-ec2.sh '${DEPLOY_BRANCH}' '${APP_SERVER_PORT}' '${APP_NAME}' '${APP_OWNER}' '${APP_ORIGIN}' '${EC2_ENV_FILE}'"
