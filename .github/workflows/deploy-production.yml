on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-slim
    environment: production
    
    strategy:
      matrix:
        node-version: [24.x]

    steps:
 
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host myserver " >> ~/.ssh/config
          echo "  HostName ${{ secrets.EC2_SERVER_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.EC2_SERVER_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run remote commands
        run: |
          SSH_OPTS="-o BatchMode=yes -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=30 -o ServerAliveCountMax=10"

          ATTEMPTS=6
          for i in $(seq 1 "$ATTEMPTS"); do
            echo "[ci] SSH preflight attempt $i/$ATTEMPTS"
            if ssh $SSH_OPTS myserver 'echo "[remote] ssh connected"'; then
              echo "[ci] SSH preflight succeeded"
              break
            fi
            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "[ci] SSH preflight failed after $ATTEMPTS attempts"
              exit 255
            fi
            sleep 15
          done

          ssh $SSH_OPTS myserver 'bash -s' < "./scripts/deploy_production_script.sh"
