<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="grad-prod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#grad-prod)"/>
  
  <!-- Accent elements -->
  <circle cx="1000" cy="120" r="140" fill="#ec4899" opacity="0.12"/>
  <circle cx="100" cy="450" r="160" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Film frame aesthetic -->
  <g stroke="#ec4899" stroke-width="3" fill="none" opacity="0.2">
    <rect x="250" y="120" width="700" height="360"/>
    <circle cx="280" cy="150" r="8" fill="#ec4899" opacity="0.3"/>
    <circle cx="920" cy="150" r="8" fill="#ec4899" opacity="0.3"/>
    <circle cx="280" cy="430" r="8" fill="#ec4899" opacity="0.3"/>
    <circle cx="920" cy="430" r="8" fill="#ec4899" opacity="0.3"/>
  </g>
  
  <!-- Label -->
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0" text-anchor="middle">
    Production Stories
  </text>
</svg>