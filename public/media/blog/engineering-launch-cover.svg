<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="grad-eng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#grad-eng)"/>
  
  <!-- Accent elements -->
  <circle cx="150" cy="150" r="120" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="500" r="180" fill="#10b981" opacity="0.08"/>
  
  <!-- Grid pattern accent -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.15">
    <line x1="200" y1="100" x2="600" y2="100"/>
    <line x1="200" y1="150" x2="600" y2="150"/>
    <line x1="200" y1="200" x2="600" y2="200"/>
    <line x1="200" y1="250" x2="600" y2="250"/>
    <line x1="200" y1="100" x2="200" y2="400"/>
    <line x1="300" y1="100" x2="300" y2="400"/>
    <line x1="400" y1="100" x2="400" y2="400"/>
    <line x1="500" y1="100" x2="500" y2="400"/>
    <line x1="600" y1="100" x2="600" y2="400"/>
  </g>
  
  <!-- Label -->
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0" text-anchor="middle">
    Engineering Insights
  </text>
</svg>