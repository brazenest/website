<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="grad-bridge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#grad-bridge)"/>
  
  <!-- Accent elements -->
  <circle cx="200" cy="300" r="150" fill="#06b6d4" opacity="0.12"/>
  <circle cx="1050" cy="200" r="140" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Bridge/connection pattern -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.15">
    <line x1="300" y1="250" x2="900" y2="250"/>
    <line x1="300" y1="350" x2="900" y2="350"/>
    <circle cx="400" cy="300" r="30" fill="none"/>
    <circle cx="600" cy="300" r="30" fill="none"/>
    <circle cx="800" cy="300" r="30" fill="none"/>
    <line x1="430" y1="300" x2="570" y2="300"/>
    <line x1="630" y1="300" x2="770" y2="300"/>
  </g>
  
  <!-- Label -->
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0" text-anchor="middle">
    Cross-Disciplinary Work
  </text>
</svg>